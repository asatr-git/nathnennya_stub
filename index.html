<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Незабаром</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: Georgia, 'Times New Roman', serif;
      background: #fafaf8;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }

    .icon { font-size: 52px; margin-bottom: 1.5rem; }

    h1 {
      font-size: 2rem;
      font-weight: normal;
      letter-spacing: -0.5px;
      margin-bottom: 1rem;
    }

    p {
      font-size: 1.05rem;
      color: #666;
      max-width: 420px;
      line-height: 1.8;
      margin-bottom: 2rem;
    }

    .divider {
      width: 40px;
      height: 2px;
      background: #ccc;
      border-radius: 2px;
    }
  </style>
</head>
<body>
  <div class="icon">🌱</div>
  <h1>Сайт незабаром відкриється</h1>
  <p>Ми вже працюємо над цим. Дякуємо за терпіння — скоро тут буде щось цікаве.</p>
  <div class="divider"></div>
</body>
</html>
